<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Multijugador Firebase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .hidden { display: none !important; }
        .roulette-wrapper { position: relative; width: 400px; height: 400px; margin: 0 auto; }
        #canvas { border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.2); transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .marker { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #dc3545; }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; background: #ffc107; font-weight: bold; z-index: 20; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: none; cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">🎯 Ruleta Live</a>
        <div id="userInfo" class="text-white hidden">
            <img id="userAvatar" src="" alt="Avatar" class="rounded-circle me-2" width="30">
            <span id="userName" class="me-3"></span>
            <button class="btn btn-sm btn-outline-light" id="btnLogout">Salir</button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div id="authSection" class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="card shadow p-4">
                <h3 class="mb-4">Bienvenido</h3>
                <button class="btn btn-danger btn-lg w-100" id="btnGoogleLogin">
                    <i class="fab fa-google me-2"></i> Ingresar con Google
                </button>
            </div>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 p-3">
                    <h4><i class="fas fa-plus-circle text-success"></i> Crear Nueva Ruleta</h4>
                    <input type="text" id="newRoomName" class="form-control mb-2" placeholder="Nombre de la sala">
                    <input type="password" id="newRoomPass" class="form-control mb-3" placeholder="Contraseña de la sala">
                    <button class="btn btn-success" id="btnCreateRoom">Crear y Entrar</button>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 p-3">
                    <h4><i class="fas fa-sign-in-alt text-primary"></i> Unirse a una Ruleta</h4>
                    <input type="text" id="joinRoomId" class="form-control mb-2" placeholder="ID de la sala">
                    <input type="password" id="joinRoomPass" class="form-control mb-3" placeholder="Contraseña">
                    <button class="btn btn-primary" id="btnJoinRoom">Unirse</button>
                </div>
            </div>
        </div>
    </div>

    <div id="rouletteSection" class="hidden">
        <button class="btn btn-secondary mb-3" id="btnLeaveRoom"><i class="fas fa-arrow-left"></i> Salir de la sala</button>
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0" id="currentRoomName">Sala...</h5>
                        <small>ID para invitar: <strong id="currentRoomIdDisplay" class="text-warning"></strong></small>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" id="newChallenge" class="form-control" placeholder="Añadir reto...">
                            <button class="btn btn-success" id="btnAddChallenge"><i class="fas fa-plus"></i></button>
                        </div>
                        <ul class="list-group" id="challengeList"></ul>
                    </div>
                </div>
            </div>

            <div class="col-md-8 text-center">
                <div class="roulette-wrapper">
                    <div class="marker"></div>
                    <canvas id="canvas" width="400" height="400"></canvas>
                    <button id="spinBtn" class="spin-btn">GIRAR</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    // Cambiamos firestore por database
    import { getDatabase, ref, set, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Tu configuración (la mantuve igual)
    const firebaseConfig = {
        apiKey: "AIzaSyAYwcsRMvGuXdIu7iVv-USSxSGBLlaOGIM",
        authDomain: "ruleta-cb504.firebaseapp.com",
        databaseURL: "https://ruleta-cb504-default-rtdb.firebaseio.com", // Asegúrate de que esta URL sea la de tu consola
        projectId: "ruleta-cb504",
        storageBucket: "ruleta-cb504.firebasestorage.app",
        messagingSenderId: "160498901059",
        appId: "1:160498901059:web:fe304467a5ab326bf8b4f6",
        measurementId: "G-5NFYLB98HR"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app); // Base de datos en tiempo real
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let currentRoomId = null;
    let challenges = [];

    const showSection = (id) => {
        ['authSection', 'dashboardSection', 'rouletteSection'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- AUTENTICACIÓN ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('userInfo').classList.remove('hidden');
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userAvatar').src = user.photoURL;
            registrarVisita(user);
            showSection('dashboardSection');
        } else {
            currentUser = null;
            document.getElementById('userInfo').classList.add('hidden');
            showSection('authSection');
        }
    });

    document.getElementById('btnGoogleLogin').addEventListener('click', () => signInWithPopup(auth, googleProvider));
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

    // --- PANEL ADMIN: CONTADOR DE USUARIOS ---
    function registrarVisita(user) {
        const hoy = new Date().toISOString().split('T')[0];
        const statsRef = ref(db, `stats/${hoy}/${user.uid}`);
        set(statsRef, { name: user.displayName, lastSeen: Date.now() });

        // Escuchar cuántos hay hoy
        onValue(ref(db, `stats/${hoy}`), (snapshot) => {
            if (snapshot.exists()) {
                const count = Object.keys(snapshot.val()).length;
                const counterDisplay = document.getElementById('activeUsersCount');
                if(counterDisplay) counterDisplay.innerText = count;
            }
        });
    }

    // --- SALAS (REALTIME DATABASE) ---
    document.getElementById('btnCreateRoom').addEventListener('click', async () => {
        const name = document.getElementById('newRoomName').value;
        const pass = document.getElementById('newRoomPass').value;
        if (!name || !pass) return Swal.fire('Error', 'Llena nombre y contraseña', 'error');

        const newRoomRef = push(ref(db, 'rooms')); // Crea ID automático
        currentRoomId = newRoomRef.key;

        await set(newRoomRef, {
            name: name,
            pass: pass,
            challenges: ["Reto 1", "Reto 2"],
            rotation: 0,
            adminId: currentUser.uid
        });

        enterRoom(currentRoomId, name);
    });

    document.getElementById('btnJoinRoom').addEventListener('click', async () => {
        const id = document.getElementById('joinRoomId').value.trim();
        const pass = document.getElementById('joinRoomPass').value;
        
        const roomRef = ref(db, `rooms/${id}`);
        const snapshot = await get(roomRef);

        if (snapshot.exists() && snapshot.val().pass === pass) {
            enterRoom(id, snapshot.val().name);
        } else {
            Swal.fire('Error', 'Datos incorrectos', 'error');
        }
    });

    function enterRoom(roomId, roomName) {
        currentRoomId = roomId;
        document.getElementById('currentRoomName').innerText = `Sala: ${roomName}`;
        document.getElementById('currentRoomIdDisplay').innerText = roomId;
        showSection('rouletteSection');
        
        // Escuchar cambios (Sincronización total)
        onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                challenges = data.challenges || [];
                drawRoulette();
                if(data.rotation) {
                    document.getElementById('canvas').style.transform = `rotate(${data.rotation}deg)`;
                }
            }
        });
    }

    // --- LÓGICA DE LA RULETA (MANTENEMOS TU CANVAS) ---
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#2ecc71'];

    function drawRoulette() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const list = document.getElementById('challengeList');
        list.innerHTML = '';
        if (challenges.length === 0) return;

        const sliceAngle = (2 * Math.PI) / challenges.length;
        const radius = canvas.width / 2;

        challenges.forEach((challenge, i) => {
            list.innerHTML += `<li class="list-group-item">${challenge}</li>`;
            const angle = i * sliceAngle - Math.PI / 2;
            ctx.beginPath();
            ctx.moveTo(radius, radius);
            ctx.arc(radius, radius, radius, angle, angle + sliceAngle);
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.stroke();
            
            ctx.save();
            ctx.translate(radius, radius);
            ctx.rotate(angle + sliceAngle / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.fillText(challenge.substring(0, 15), radius - 20, 5);
            ctx.restore();
        });
    }

    document.getElementById('btnAddChallenge').addEventListener('click', () => {
        const input = document.getElementById('newChallenge');
        if(input.value && currentRoomId) {
            const newChallenges = [...challenges, input.value];
            update(ref(db, `rooms/${currentRoomId}`), { challenges: newChallenges });
            input.value = '';
        }
    });

    document.getElementById('spinBtn').addEventListener('click', async () => {
        if(!currentRoomId || challenges.length === 0) return;
        const extraRotation = (5 * 360) + Math.floor(Math.random() * 360);
        
        const snapshot = await get(ref(db, `rooms/${currentRoomId}/rotation`));
        const currentRot = snapshot.val() || 0;

        update(ref(db, `rooms/${currentRoomId}`), { rotation: currentRot + extraRotation });
    });

</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
